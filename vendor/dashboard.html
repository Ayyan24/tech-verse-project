<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard - Tech Verse</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Top Layout Header Container -->
    <div id="vendor-header"></div>

    <div class="flex flex-grow overflow-hidden">
        <!-- Sidebar Navigation Container -->
        <div id="vendor-sidebar"></div>

        <!-- Main Workspace -->
        <main class="flex-grow p-6 md:p-8 overflow-y-auto">
            <!-- Header section -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Merchant Dashboard</h1>
                    <p class="text-slate-450 text-xs mt-1">Real-time statistics of your shop performance</p>
                </div>
                <!-- Dynamic Date badge -->
                <span class="text-xs font-bold text-slate-500 bg-white border border-slate-200 rounded-xl px-4 py-2.5 shadow-sm"><i class="far fa-calendar-alt text-blue-500 mr-2"></i>Date: June 16, 2026</span>
            </div>

            <!-- KPI Grid Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <!-- Total Products -->
                <div class="bg-white border border-slate-200/80 rounded-2xl p-6 flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center text-xl shrink-0"><i class="fas fa-boxes"></i></div>
                    <div>
                        <span class="block text-[10px] text-slate-450 uppercase tracking-wider font-bold mb-0.5">Total Products</span>
                        <span id="stat-products" class="text-xl font-extrabold text-slate-800">0</span>
                    </div>
                </div>
                <!-- Orders -->
                <div class="bg-white border border-slate-200/80 rounded-2xl p-6 flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl shrink-0"><i class="fas fa-shopping-bag"></i></div>
                    <div>
                        <span class="block text-[10px] text-slate-450 uppercase tracking-wider font-bold mb-0.5">Shop Orders</span>
                        <span id="stat-orders" class="text-xl font-extrabold text-slate-800">0</span>
                    </div>
                </div>
                <!-- Revenue -->
                <div class="bg-white border border-slate-200/80 rounded-2xl p-6 flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl shrink-0"><i class="fas fa-coins"></i></div>
                    <div>
                        <span class="block text-[10px] text-slate-450 uppercase tracking-wider font-bold mb-0.5">Revenue Generated</span>
                        <span id="stat-revenue" class="text-xl font-extrabold text-slate-800">PKR 0</span>
                    </div>
                </div>
                <!-- Customers -->
                <div class="bg-white border border-slate-200/80 rounded-2xl p-6 flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center text-xl shrink-0"><i class="fas fa-users"></i></div>
                    <div>
                        <span class="block text-[10px] text-slate-450 uppercase tracking-wider font-bold mb-0.5">Unique Customers</span>
                        <span id="stat-customers" class="text-xl font-extrabold text-slate-800">0</span>
                    </div>
                </div>
            </div>

            <!-- Charts and Tables -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Sales chart -->
                <div class="lg:col-span-2 bg-white border border-slate-200/80 rounded-2xl p-6 shadow-sm">
                    <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-6 pb-3 border-b border-slate-100"><i class="fas fa-chart-line text-blue-500 mr-2"></i>Sales Analytics (2026)</h3>
                    <div class="relative h-72">
                        <canvas id="vendorSalesChart"></canvas>
                    </div>
                </div>
                <!-- Top products summary -->
                <div class="bg-white border border-slate-200/80 rounded-2xl p-6 shadow-sm">
                    <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-6 pb-3 border-b border-slate-100"><i class="fas fa-award text-blue-500 mr-2"></i>Product Status Summary</h3>
                    <div class="relative h-72 flex items-center justify-center">
                        <canvas id="vendorProductChart"></canvas>
                    </div>
                </div>

                <!-- Recent Orders -->
                <div class="lg:col-span-3 bg-white border border-slate-200/80 rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-6 pb-3 border-b border-slate-100">
                        <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider"><i class="fas fa-history text-blue-500 mr-2"></i>Recent Incoming Orders</h3>
                        <a href="orders.html" class="text-xs font-bold text-blue-600 hover:underline">Manage All Orders</a>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-xs">
                            <thead>
                                <tr class="border-b border-slate-100 text-slate-400 font-bold uppercase tracking-wider pb-3">
                                    <th class="py-2.5">Order ID</th>
                                    <th class="py-2.5">Customer Name</th>
                                    <th class="py-2.5">Date</th>
                                    <th class="py-2.5">Amount</th>
                                    <th class="py-2.5">Status</th>
                                </tr>
                            </thead>
                            <tbody id="recent-orders-tbody" class="divide-y divide-slate-100">
                                <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/firebase-db.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/vendor.js"></script>
</body>
</html>
