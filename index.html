<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Verse - Pakistan's Premium IT Store</title>
    <meta name="description" content="Tech Verse — Shop laptops, monitors, components and accessories.">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .hero-simple {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            color: white;
            padding: 48px 24px;
            text-align: center;
        }
        .hero-simple h1 { font-size: 2rem; font-weight: 800; margin: 0 0 8px; }
        .hero-simple p { font-size: 14px; opacity: 0.85; margin: 0 0 20px; }
        .hero-simple a {
            display: inline-block;
            background: #0ea5e9;
            color: white;
            padding: 10px 24px;
            font-weight: 700;
            font-size: 13px;
            border-radius: 4px;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            .hero-simple { padding: 32px 16px; }
            .hero-simple h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="navbar-container"></div>

    <main class="flex-grow">

        <section class="hero-simple">
            <h1>Tech Verse</h1>
            <p>Pakistan's IT store — laptops, monitors, components &amp; more</p>
            <a href="buyer/products.html">Browse All Products</a>
        </section>

        <section style="max-width:1280px;margin:0 auto;padding:20px 16px;">
            <h2 class="section-title" style="margin:0 0 12px;">Categories</h2>
            <div id="categories-slider-container" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar"></div>
        </section>

        <section style="max-width:1280px;margin:0 auto;padding:0 16px 32px;">
            <div style="background:white;border:1px solid #e0e0e0;border-radius:4px;padding:16px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                    <h2 class="section-title" style="margin:0;">Products</h2>
                    <a href="buyer/products.html" class="brand-link" style="font-size:12px;font-weight:600;">View All</a>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3" id="featured-products-grid"></div>
            </div>
        </section>

    </main>

    <div id="footer-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-db.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/common.js"></script>
    <script src="js/homepage.js"></script>
</body>
</html>
