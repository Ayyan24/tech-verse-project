<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Approvals - Tech Verse</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Header Container -->
    <div id="admin-header"></div>

    <div class="flex flex-grow overflow-hidden">
        <!-- Sidebar Container -->
        <div id="admin-sidebar"></div>

        <!-- Main Workspace -->
        <main class="flex-grow p-6 md:p-8 overflow-y-auto">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Catalog Product Moderation</h1>
                    <p class="text-slate-450 text-xs mt-1">Review new vendor items and approve/reject listings before public release</p>
                </div>
            </div>

            <!-- Moderation Table Card -->
            <div class="bg-white border border-slate-200/80 rounded-2xl p-6 shadow-sm">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs">
                        <thead>
                            <tr class="border-b border-slate-100 text-slate-400 font-bold uppercase tracking-wider pb-3">
                                <th class="py-2.5">Thumbnail</th>
                                <th class="py-2.5">Product Name</th>
                                <th class="py-2.5">Vendor</th>
                                <th class="py-2.5">Category</th>
                                <th class="py-2.5 text-center">Status</th>
                                <th class="py-2.5 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="product-approval-tbody" class="divide-y divide-slate-100">
                            <!-- Injected dynamically -->
                        </tbody>
                    </table>
                </div>

                <!-- Empty State -->
                <div id="product-empty-state" class="hidden text-center py-16">
                    <div class="w-16 h-16 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center text-xl mx-auto mb-4 border border-slate-100"><i class="fas fa-boxes"></i></div>
                    <h3 class="font-bold text-slate-850 text-base">No Products Pending</h3>
                    <p class="text-slate-400 text-xs mt-1">All catalog listings have been reviewed by platform moderation.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/firebase-db.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
