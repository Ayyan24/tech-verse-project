<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Tech Verse</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Sticky Navbar Container -->
    <div id="navbar-container"></div>

    <!-- Page Header / Breadcrumb -->
    <div class="page-hero py-8">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-2xl font-extrabold tracking-tight">Account Dashboard</h1>
            <p class="text-sm text-white/70 mt-2 max-w-xl">Manage your personal details and security settings from a more polished account workspace.</p>
            <nav class="flex text-xs text-slate-400 mt-1.5 font-medium">
                <a href="../index.html" class="page-hero-link">Home</a>
                <span class="mx-2 text-slate-700"><i class="fas fa-chevron-right text-[8px]"></i></span>
                <span class="page-hero-current">My Profile</span>
            </nav>
        </div>
    </div>

    <!-- Main Container -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        <!-- Sidebar Navigation -->
        <aside class="w-full lg:w-64 shrink-0 flex flex-col gap-3">
            <div class="surface-panel p-5 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-teal-50 flex items-center justify-center text-teal-600 text-lg"><i class="fas fa-user-circle"></i></div>
                <div>
                    <h4 class="font-extrabold text-slate-800 text-sm truncate" id="aside-username">John Doe</h4>
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Buyer Account</span>
                </div>
            </div>

            <div class="surface-panel p-4 flex flex-col gap-1.5 font-semibold text-xs text-slate-600">
                <button id="menu-info-btn" class="flex items-center gap-2.5 w-full text-left p-3 rounded-xl bg-teal-50 text-teal-600 transition-all">
                    <i class="far fa-user text-sm"></i> Personal Info
                </button>
                <a href="orders.html" class="flex items-center gap-2.5 w-full text-left p-3 rounded-xl hover:bg-slate-50 transition-all">
                    <i class="fas fa-shopping-bag text-sm"></i> Order History
                </a>
                <a href="wishlist.html" class="flex items-center gap-2.5 w-full text-left p-3 rounded-xl hover:bg-slate-50 transition-all">
                    <i class="far fa-heart text-sm"></i> Saved Wishlist
                </a>
                <button id="menu-settings-btn" class="flex items-center gap-2.5 w-full text-left p-3 rounded-xl hover:bg-slate-50 transition-all">
                    <i class="fas fa-cog text-sm"></i> Profile Settings
                </button>
            </div>
        </aside>

        <!-- Dynamic Content Box -->
        <section class="flex-grow surface-panel p-6 md:p-8">
            <!-- Panel 1: Personal Info -->
            <div id="panel-info" class="panel-box">
                <h3 class="font-bold text-slate-900 text-base pb-3 border-b border-slate-100 mb-6">Personal Information</h3>
                
                <form id="profile-info-form" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label for="profile-name" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Full Name</label>
                            <input id="profile-name" type="text" required placeholder="Full Name" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label for="profile-email" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Email Address</label>
                            <input id="profile-email" type="email" disabled class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl text-slate-450 text-sm focus:outline-none cursor-not-allowed">
                        </div>
                        <div>
                            <label for="profile-phone" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Phone Number</label>
                            <input id="profile-phone" type="text" placeholder="Phone Number" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label for="profile-city" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">City</label>
                            <input id="profile-city" type="text" placeholder="City" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                        </div>
                        <div class="md:col-span-2">
                            <label for="profile-address" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Street Address</label>
                            <input id="profile-address" type="text" placeholder="Street Address" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                        </div>
                    </div>

                    <button type="submit" class="brand-btn-primary text-white font-bold text-xs px-6 py-3 rounded-xl transition-all">
                        Save Changes
                    </button>
                </form>
            </div>

            <!-- Panel 2: Settings (Password Change Mock) -->
            <div id="panel-settings" class="panel-box hidden">
                <h3 class="font-bold text-slate-900 text-base pb-3 border-b border-slate-100 mb-6">Security Settings</h3>
                
                <form id="profile-security-form" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="md:col-span-2">
                            <label for="profile-curr-pass" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Current Password</label>
                            <input id="profile-curr-pass" type="password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label for="profile-new-pass" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">New Password</label>
                            <input id="profile-new-pass" type="password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label for="profile-new-pass-confirm" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Confirm New Password</label>
                            <input id="profile-new-pass-confirm" type="password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition-all">
                        </div>
                    </div>

                    <button type="submit" class="brand-btn-primary text-white font-bold text-xs px-6 py-3 rounded-xl transition-all">
                        Update Password
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/firebase-db.js"></script>
    <script src="../js/common.js"></script>
    <!-- Profile specific logic -->
    <script src="../js/profile.js"></script>
</body>
</html>
