<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Tech Verse</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Sticky Navbar Container -->
    <div id="navbar-container"></div>

    <!-- Breadcrumbs Navigation -->
    <div class="page-hero py-5">
        <div class="max-w-7xl mx-auto px-4">
            <nav class="flex text-xs font-semibold text-slate-400">
                <a href="../index.html" class="page-hero-link">Home</a>
                <span class="mx-2 text-slate-700"><i class="fas fa-chevron-right text-[8px]"></i></span>
                <a href="products.html" class="page-hero-link">Products</a>
                <span class="mx-2 text-slate-700"><i class="fas fa-chevron-right text-[8px]"></i></span>
                <span class="page-hero-current" id="breadcrumb-product-name">Product Name</span>
            </nav>
        </div>
    </div>

    <!-- Main Content Container -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-8">
        <!-- Product Main details Card -->
        <div class="surface-panel p-6 md:p-8 flex flex-col md:flex-row gap-8">
            <!-- Left Side: Image Gallery -->
            <div class="w-full md:w-1/2 flex flex-col gap-4">
                <div class="aspect-[4/3] bg-slate-50 border border-slate-100 rounded-2xl flex items-center justify-center p-6 overflow-hidden">
                    <img id="detail-main-img" src="" alt="Product Image" class="object-contain max-h-[300px] max-w-full hover:scale-105 transition-transform duration-300">
                </div>
                <!-- Mini thumbnails -->
                <div class="flex gap-4">
                    <button class="w-20 h-20 bg-slate-50 border-2 border-teal-500 rounded-xl p-2 flex items-center justify-center focus:outline-none overflow-hidden">
                        <img id="thumb-img-1" src="" alt="thumbnail" class="object-contain max-h-full max-w-full">
                    </button>
                    <button class="w-20 h-20 bg-slate-50 border border-slate-200 rounded-xl p-2 flex items-center justify-center focus:outline-none overflow-hidden hover:border-slate-350 transition-colors">
                        <img id="thumb-img-2" src="" alt="thumbnail" class="object-contain max-h-full max-w-full hidden">
                    </button>
                </div>
            </div>

            <!-- Right Side: Content Details -->
            <div class="w-full md:w-1/2 flex flex-col justify-between">
                <div>
                    <!-- Brand and status -->
                    <div class="flex items-center justify-between gap-4">
                        <span id="detail-brand" class="text-xs font-bold text-teal-600 bg-teal-50 px-3 py-1 rounded-full uppercase tracking-wider">ASUS</span>
                        <span id="detail-stock-badge" class="text-xs font-bold px-3 py-1 rounded-full">In Stock</span>
                    </div>

                    <!-- Title -->
                    <h1 id="detail-title" class="text-2xl md:text-3xl font-extrabold text-slate-900 mt-4 leading-tight">Product Title</h1>

                    <!-- Ratings Summary -->
                    <div class="flex items-center gap-2 mt-3 mb-6">
                        <div class="flex text-yellow-400 text-sm" id="detail-stars">
                            <!-- Stars injected dynamically -->
                        </div>
                        <span id="detail-rating-text" class="text-xs text-slate-500 font-bold">4.8 (24 Verified Reviews)</span>
                    </div>

                    <!-- Price Block -->
                    <div class="bg-slate-50 border border-slate-100 p-5 rounded-2xl mb-6">
                        <div class="flex items-baseline gap-3">
                            <span id="detail-price" class="text-3xl font-black text-slate-900">PKR 0</span>
                            <span id="detail-old-price" class="text-sm text-slate-400 line-through hidden">PKR 0</span>
                        </div>
                        <p class="text-[10px] text-slate-400 font-semibold mt-1 uppercase tracking-wider">Prices include GST / Shipping computed at checkout</p>
                    </div>

                    <!-- Short Description -->
                    <p id="detail-desc" class="text-slate-500 text-sm leading-relaxed mb-6">Product short description goes here.</p>
                </div>

                <!-- Action Blocks -->
                <div class="pt-6 border-t border-slate-100">
                    <div class="flex flex-wrap items-center gap-4">
                        <!-- Qty Selector -->
                        <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl px-2 py-1 select-none">
                            <button id="qty-minus" class="w-9 h-9 rounded-lg hover:bg-white text-slate-600 flex items-center justify-center font-bold transition-colors"><i class="fas fa-minus text-xs"></i></button>
                            <span id="qty-val" class="w-10 text-center font-bold text-slate-800 text-sm">1</span>
                            <button id="qty-plus" class="w-9 h-9 rounded-lg hover:bg-white text-slate-600 flex items-center justify-center font-bold transition-colors"><i class="fas fa-plus text-xs"></i></button>
                        </div>

                        <!-- Add to cart -->
                        <button id="detail-add-cart-btn" class="flex-grow py-3 brand-btn-primary text-white font-extrabold rounded-xl transition-all text-sm">
                            <i class="fas fa-shopping-cart mr-2"></i> Add To Cart
                        </button>

                        <!-- Add to Wishlist -->
                        <button id="detail-add-wish-btn" class="w-12 h-12 rounded-xl bg-slate-50 border border-slate-200 text-slate-400 hover:text-red-500 hover:bg-red-50 hover:border-red-100 flex items-center justify-center transition-all">
                            <i class="far fa-heart text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Specifications & Reviews Tabs -->
        <section class="mt-12 surface-panel overflow-hidden">
            <!-- Tabs Headers -->
            <div class="flex border-b border-slate-100 bg-slate-50/50">
                <button id="tab-specs-btn" class="tab-btn px-6 py-4 text-sm font-bold border-b-2 border-teal-500 text-teal-600 focus:outline-none">Specifications</button>
                <button id="tab-reviews-btn" class="tab-btn px-6 py-4 text-sm font-bold border-b-2 border-transparent text-slate-450 hover:text-slate-800 focus:outline-none">Reviews (0)</button>
            </div>

            <!-- Tabs content -->
            <div class="p-6 md:p-8">
                <!-- Specifications Tab Content -->
                <div id="tab-specs-content" class="tab-content">
                    <table class="w-full text-sm text-left border-collapse">
                        <tbody id="detail-specs-table" class="divide-y divide-slate-100">
                            <!-- Specs rows injected dynamically -->
                        </tbody>
                    </table>
                </div>

                <!-- Reviews Tab Content -->
                <div id="tab-reviews-content" class="tab-content hidden space-y-6">
                    <div class="flex flex-col md:flex-row justify-between gap-6 pb-6 border-b border-slate-100">
                        <div>
                            <h3 class="font-bold text-slate-800 text-base">Reviews Summary</h3>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-3xl font-black text-slate-900" id="reviews-avg-rating">0.0</span>
                                <div class="flex flex-col">
                                    <div class="flex text-yellow-400 text-xs" id="reviews-avg-stars"></div>
                                    <span class="text-[10px] text-slate-400 font-semibold uppercase mt-0.5" id="reviews-count-badge">Based on 0 reviews</span>
                                </div>
                            </div>
                        </div>
                        <!-- Mock review submit trigger -->
                        <button id="write-review-btn" class="brand-btn-primary text-white font-bold text-xs px-5 py-2.5 rounded-xl h-fit self-start">Write a Review</button>
                    </div>

                    <!-- Reviews List -->
                    <div id="reviews-list" class="divide-y divide-slate-100">
                        <!-- Reviews rows injected dynamically -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Related Products Section -->
        <section class="mt-12">
            <h2 class="text-xl font-bold text-slate-800 border-l-4 border-teal-500 pl-3 mb-6">Related Products</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="detail-related-grid">
                <!-- Related cards injected dynamically -->
            </div>
        </section>
    </main>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/firebase-db.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/product-details.js"></script>
</body>
</html>
